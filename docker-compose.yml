version: '3.8'

services:
  # Next.js Fullstack Server (Frontend & Database APIs)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./dev.db
      - PORT=3000
    volumes:
      - sqlite_data:/app/prisma
    restart: always

  # Standalone Express Server (Fulfilling Express Node.js requirement)
  express-backend:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["npx", "tsx", "src/backend/server.ts"]
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=file:./prisma/dev.db
    volumes:
      - sqlite_data:/app/prisma
    restart: always

volumes:
  sqlite_data:
